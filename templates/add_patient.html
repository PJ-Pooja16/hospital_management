{% extends 'base.html' %}
{% block title %}Add Patient - Hospital Management System{% endblock %}
{% block page_title %}Add New Patient{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Patient Details</h2>
    <form action="/add_patient" method="POST">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" placeholder="Full Name" required>
        </div>
        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" placeholder="Patient's Age" required>
        </div>
        <div class="form-group">
            <label>Gender</label>
            <select name="gender">
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" placeholder="Contact Number">
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea name="address" placeholder="Residential Address"></textarea>
        </div>
        <button type="submit" class="btn">
            <i class="fas fa-save"></i> Save Patient
        </button>
    </form>
</div>
{% endblock %}
