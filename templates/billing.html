{% extends 'base.html' %}
{% block title %}Billing - Hospital Management System{% endblock %}
{% block page_title %}Patient Billing{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Generate Bill</h2>
    <form action="/billing" method="POST">
        <div class="form-group">
            <label>Patient</label>
            <select name="patient_id" required>
                <option value="" disabled selected>Select a Patient</option>
                {% for patient in patients %}
                <option value="{{ patient[0] }}">{{ patient[0] }} - {{ patient[1] }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Amount (₹)</label>
            <input type="number" name="amount" placeholder="Enter Total Amount" required>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option>Paid</option>
                <option>Pending</option>
            </select>
        </div>
        <button type="submit" class="btn">
            <i class="fas fa-file-invoice"></i> Generate Invoice
        </button>
    </form>
</div>
{% endblock %}
