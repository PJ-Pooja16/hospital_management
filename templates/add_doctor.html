{% extends 'base.html' %}
{% block title %}Add Doctor - Hospital Management System{% endblock %}
{% block page_title %}Add New Doctor{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Doctor Details</h2>
    <form action="/add_doctor" method="POST">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" placeholder="Doctor's Full Name" required>
        </div>
        <div class="form-group">
            <label>Specialization</label>
            <input type="text" name="specialization" placeholder="e.g. Cardiologist, Neurologist">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" placeholder="Contact Number">
        </div>
        <button type="submit" class="btn">
            <i class="fas fa-save"></i> Save Doctor
        </button>
    </form>
</div>
{% endblock %}
