{% extends 'base.html' %}
{% block title %}Edit Medical Record - Hospital Management System{% endblock %}
{% block page_title %}Edit Medical Record{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Update Patient History: <span style="color: var(--primary-color);">{{ record[1] }}</span></h2>
    <form action="/edit_record/{{ record[0] }}" method="POST">
        <div class="form-group">
            <label>Diagnosis</label>
            <textarea name="diagnosis" rows="4" required>{{ record[2] }}</textarea>
        </div>
        
        <div class="form-group">
            <label>Treatment</label>
            <textarea name="treatment" rows="4" required>{{ record[3] }}</textarea>
        </div>
        
        <div class="form-group">
            <label>Record Date</label>
            <input type="date" name="record_date" value="{{ record[4] }}" required>
        </div>
        
        <div style="display: flex; gap: 12px;">
            <button type="submit" class="btn">
                <i class="fas fa-save"></i> Update Record
            </button>
            <a href="/medical_records" class="btn" style="background: var(--text-muted); text-align: center;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
