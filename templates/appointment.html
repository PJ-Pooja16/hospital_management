{% extends 'base.html' %}
{% block title %}Book Appointment - Hospital Management System{% endblock %}
{% block page_title %}Book an Appointment{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Appointment Schedule</h2>
    <form action="/appointment" method="POST">
        <div class="form-group">
            <label>Patient</label>
            <select name="patient_id" required>
                <option value="" disabled selected>Select a Patient</option>
                {% for patient in patients %}
                <option value="{{ patient[0] }}">{{ patient[0] }} - {{ patient[1] }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Doctor</label>
            <select name="doctor_id" required>
                <option value="" disabled selected>Select a Doctor</option>
                {% for doctor in doctors %}
                <option value="{{ doctor[0] }}">{{ doctor[0] }} - {{ doctor[1] }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Date</label>
            <input type="date" name="date" required>
        </div>
        <div class="form-group">
            <label>Time</label>
            <input type="time" name="time" required>
        </div>
        <button type="submit" class="btn">
            <i class="fas fa-calendar-check"></i> Confirm Booking
        </button>
    </form>
</div>
{% endblock %}
